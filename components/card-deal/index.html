<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dsh-card-deal — Dev</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../src/generated-tokens/tokens.css" />
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; padding: 32px; background: #f6f7f7; display: flex; flex-wrap: wrap; gap: 24px; }

    <script type="module" src="./index.js"></script>

  <body>
    <h2>Default</h2>
    <dsh-card-deal
      variant="default"
      tag-color="yellow"
      tag-text="Text Tag"
      img="https://www.w3schools.com/howto/img_mountains_wide.jpg"

      link-text="Ver oferta"

    <h2>Featured — Blue</h2>
    <dsh-card-deal
      variant="featured"
      segment="blue"
      tag-color="yellow"

      img="https://www.w3schools.com/howto/img_mountains_wide.jpg"

    <dsh-card-deal
      variant="featured-discount"
      segment="purple"
      tag-color="yellow"

      description="Disponible en productos seleccionados."
      amount="50<sup>%</sup>"
      textamount="<strong>Ahorro</strong>"
      link="https://www.google.com"
      link-text="Ver detalle"
    ></dsh-card-deal>

    <h2>Featured — Slate</h2>
    <dsh-card-deal
      variant="featured"
      segment="slate"
      img="https://www.w3schools.com/howto/img_mountains_wide.jpg"
      title="Card Slate"
      subtitle="Subtítulo de ejemplo"
      description="Descripción de ejemplo del componente."
      amount="30%"
      textamount="Precio"
    ></dsh-card-deal>
