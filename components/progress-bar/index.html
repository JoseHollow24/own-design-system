<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dsh-progress-bar — Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;650;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../src/generated-tokens/tokens.css" />
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; padding: 32px; background: #f6f7f7; }
      section { background: #fff; border-radius: 12px; padding: 32px; margin-bottom: 24px; max-width: 600px; }
      h2 { font-size: 14px; color: #586264; margin: 0 0 16px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
    <script type="module" src="./index.js"></script>
  </head>
  <body>
    <section>
      <h2>Por defecto</h2>
      <dsh-progress-bar
        options-data='[{"value":40,"color":"c1","label":"Segmento A"},{"value":35,"color":"v1","label":"Segmento B"},{"value":25,"color":"a3","label":"Segmento C"}]'
        label-top-start="Inicio"
        label-top-end="Fin"
        label-bottom-start="0"
        label-bottom-end="100"
      ></dsh-progress-bar>
    </section>
    <section>
      <h2>Con título</h2>
      <dsh-progress-bar
        options-data='[{"value":60,"color":"c1","label":"Completado"},{"value":40,"color":"g4","label":"Pendiente"}]'
        label-top-start="0%"
        label-top-end="100%"
      >
        <span slot="title">Progreso total</span>
      </dsh-progress-bar>
    </section>
    <section>
      <h2>Múltiples segmentos</h2>
      <dsh-progress-bar
        options-data='[{"value":25,"color":"c1","label":"Ene"},{"value":30,"color":"v1","label":"Feb"},{"value":20,"color":"a3","label":"Mar"},{"value":15,"color":"r1","label":"Abr"},{"value":10,"color":"n1","label":"May"}]'
        label-top-start="Enero"
        label-top-end="Mayo"
      ></dsh-progress-bar>
    </section>
  </body>
</html>
