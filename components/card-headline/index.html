<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dsh-card-headline — Dev</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../src/generated-tokens/tokens.css" />
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; padding: 32px; background: #f6f7f7; display: flex; flex-wrap: wrap; gap: 24px; }
      h2 { font-size: 13px; color: #586264; margin: 0 0 8px; text-transform: uppercase; width: 100%; }
      dsh-card-headline { max-width: 300px; }
    </style>
    <script type="module" src="./index.js"></script>
  </head>
  <body>
    <h2>Info — Blue</h2>
    <dsh-card-headline
      segment="blue"
      variant="info"
      img="https://www.w3schools.com/howto/img_mountains_wide.jpg"
      amount="50%"
      button-text="Ver beneficio"
      button-link="https://www.google.com"
    >
      <span slot="title">Descuento especial</span>
      <span slot="description">Válido para compras en línea hasta agotar stock.</span>
    </dsh-card-headline>

    <h2>Info — Purple</h2>
    <dsh-card-headline
      segment="purple"
      variant="info"
      img="https://www.w3schools.com/howto/img_mountains_wide.jpg"
      amount="$9.990"
    >
      <span slot="title">Beneficio mensual</span>
      <span slot="description">Tu beneficio mensual disponible para activar.</span>
    </dsh-card-headline>

    <h2>Custom Variant</h2>
    <dsh-card-headline
      segment="slate"
      variant="custom"
      img="https://www.w3schools.com/howto/img_mountains_wide.jpg"
    >
      <span slot="title">Card personalizado</span>
      <div>Contenido personalizado del cuerpo del card.</div>
    </dsh-card-headline>
  </body>
</html>
