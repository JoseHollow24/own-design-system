<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSH Datepicker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 24px; background: #f5f5f5; }
      .demo { display: flex; gap: 32px; flex-wrap: wrap; margin-bottom: 32px; align-items: flex-start; }
    </style>
  </head>
  <body>
    <h1>DSH Datepicker</h1>

    <div class="demo">
      <dsh-datepicker
        label="Fecha de viaje"
        placeholder="DD/MM/AAAA"
        helper="Selecciona una fecha"
      ></dsh-datepicker>

      <dsh-datepicker
        label="Rango de fechas"
        placeholder="DD/MM/AAAA - DD/MM/AAAA"
        helper="Selecciona fecha de inicio y fin"
        two-months
      ></dsh-datepicker>
    </div>

    <script type="module" src="./index.js"></script>
  </body>
</html>
